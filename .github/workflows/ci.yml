name: CI Pipeline
on:
  pull_request:
    branches: [main]

# Gemini: Prevents wasting server money: cancels running tasks if a developer pushes new code to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend Quality Check
    runs-on: ubuntu-latest

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@V7

      - name: Detect Modified Folders
        id: file-changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend: 'frontend/**'
            backend: 'backend/**'

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Run Frontend Checks
        if: steps.file-changes.outputs.frontend == 'true'
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build

      - name: Run Backend Checks
        if: steps.file-changes.outputs.backend == 'true'
        run: |
          cd backend
          npm ci
          npm run lint
          npm run build
